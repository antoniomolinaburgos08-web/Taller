## ============================================================
## docker-compose de DESARROLLO local
## ------------------------------------------------------------
## Para producción usa `deploy/docker-compose.yml` (con HTTPS
## automático, secretos en .env y reverse proxy Caddy).
##
## Uso local:
##   docker compose up -d
##   Frontend  → http://localhost:8085
##   Strapi    → http://localhost:1337/admin
##   Chatwoot  → http://localhost:3000
## ============================================================

name: taller-dev

services:

  web-publica:
    image: nginx:alpine
    restart: unless-stopped
    ports: ["8085:80"]
    volumes:
      - ./web-publica:/usr/share/nginx/html:ro

  crm:
    image: nginx:alpine
    restart: unless-stopped
    ports: ["8086:80"]
    volumes:
      - ./crm:/usr/share/nginx/html:ro

  strapi-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi_dev
      POSTGRES_DB: strapi
    volumes:
      - strapi_db_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  strapi:
    build: ./backend/strapi-cms
    restart: unless-stopped
    ports: ["1337:1337"]
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 1337
      DATABASE_CLIENT: postgres
      DATABASE_HOST: strapi-db
      DATABASE_PORT: 5432
      DATABASE_NAME: strapi
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi_dev
      DATABASE_SSL: "false"
      APP_KEYS: "dev1,dev2,dev3,dev4"
      API_TOKEN_SALT: "dev_salt"
      ADMIN_JWT_SECRET: "dev_admin_jwt"
      TRANSFER_TOKEN_SALT: "dev_transfer_salt"
      JWT_SECRET: "dev_jwt"
      ENCRYPTION_KEY: "dev_encryption_key"
      FRONTEND_URL: http://localhost:8085
    volumes:
      - strapi_uploads_dev:/app/public/uploads
    depends_on:
      strapi-db:
        condition: service_healthy

  chatwoot-db:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: chatwoot_dev
      POSTGRES_DB: chatwoot
    volumes:
      - chatwoot_db_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwoot"]
      interval: 10s
      timeout: 5s
      retries: 5

  chatwoot-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "chatwoot_dev_redis"]
    volumes:
      - chatwoot_redis_dev:/data

  chatwoot-web:
    image: chatwoot/chatwoot:latest
    restart: unless-stopped
    ports: ["3000:3000"]
    environment:
      SECRET_KEY_BASE: "dev_secret_key_base_change_in_production_change_this_now"
      FRONTEND_URL: http://localhost:3000
      POSTGRES_HOST: chatwoot-db
      POSTGRES_USERNAME: chatwoot
      POSTGRES_PASSWORD: chatwoot_dev
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://:chatwoot_dev_redis@chatwoot-redis:6379
      REDIS_PASSWORD: chatwoot_dev_redis
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      INSTALLATION_ENV: docker
    command: ["bundle", "exec", "rails", "server", "-b", "0.0.0.0", "-p", "3000"]
    volumes:
      - chatwoot_storage_dev:/app/storage
    depends_on:
      chatwoot-db:
        condition: service_healthy
      chatwoot-redis:
        condition: service_started

  chatwoot-worker:
    image: chatwoot/chatwoot:latest
    restart: unless-stopped
    environment:
      SECRET_KEY_BASE: "dev_secret_key_base_change_in_production_change_this_now"
      FRONTEND_URL: http://localhost:3000
      POSTGRES_HOST: chatwoot-db
      POSTGRES_USERNAME: chatwoot
      POSTGRES_PASSWORD: chatwoot_dev
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://:chatwoot_dev_redis@chatwoot-redis:6379
      REDIS_PASSWORD: chatwoot_dev_redis
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      INSTALLATION_ENV: docker
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    volumes:
      - chatwoot_storage_dev:/app/storage
    depends_on:
      chatwoot-web:
        condition: service_started

volumes:
  strapi_db_dev:
  strapi_uploads_dev:
  chatwoot_db_dev:
  chatwoot_redis_dev:
  chatwoot_storage_dev:
