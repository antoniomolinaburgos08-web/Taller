<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller de Migue - Migue CRM Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Respaldo si el CDN de SweetAlert no carga: el CRM sigue funcionando con avisos nativos
        if (typeof window.Swal === 'undefined') {
            window.Swal = {
                fire: function (t, m) {
                    const o = (typeof t === 'object' && t !== null) ? t : { title: t, text: m };
                    if (!o.toast) alert([o.title, o.text].filter(Boolean).join(' - '));
                    return Promise.resolve({ isConfirmed: true });
                }
            };
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script>

        function getAuthHeaders() {
            const token = localStorage.getItem('crm_jwt');
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        async function fetchAPI(url, options = {}) {
            options.headers = { ...options.headers, ...getAuthHeaders() };
            return fetch(url, options);
        }

        async function loginCRM(event) {
            event.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                const res = await fetch(`${API_BASE}/auth/local`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier: email, password })
                });
                const data = await res.json();
                if(data.jwt) {
                    localStorage.setItem('crm_jwt', data.jwt);
                    document.getElementById('login-overlay').classList.add('hidden');
                    fetchData();
                    showSection('dashboard');
                } else {
                    Swal.fire('Error', 'Credenciales incorrectas. Revisa el email y la contraseña.', 'error');
                }
            } catch(e) {
                Swal.fire('Sin conexión', 'No se pudo conectar con el servidor. Inténtalo de nuevo en unos segundos.', 'error');
            }
        }

        function checkAuth() {
            if(!localStorage.getItem('crm_jwt')) {
                document.getElementById('login-overlay').classList.remove('hidden');
                return false;
            }
            return true;
        }

        function logoutCRM() {
            localStorage.removeItem('crm_jwt');
            location.reload();
        }

        if (window.tailwind) tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Outfit', 'sans-serif'] }, colors: { dark: '#0f172a', darker: '#020617', primary: '#3b82f6', accent: '#10b981' } } } }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #020617; color: white; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
        .stat-card { transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.5); }
        .nav-item { transition: all 0.3s ease; border-left: 4px solid transparent; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.05); }
        .nav-item.active { background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, transparent 100%); border-left: 4px solid #3b82f6; color: white; }
        input, select, textarea { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 0.5rem; padding: 0.75rem; width: 100%; outline: none; transition: border-color 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; }

    <script>
        if(!localStorage.getItem('crm_facturas')) localStorage.setItem('crm_facturas', JSON.stringify([]));
        if(!localStorage.getItem('crm_promos')) localStorage.setItem('crm_promos', JSON.stringify([]));
        if(!localStorage.getItem('crm_bot_status')) localStorage.setItem('crm_bot_status', 'false');
        if(!localStorage.getItem('crm_local_clientes')) localStorage.setItem('crm_local_clientes', JSON.stringify([]));
        if(!localStorage.getItem('crm_local_ordenes')) localStorage.setItem('crm_local_ordenes', JSON.stringify([]));
        if(!localStorage.getItem('crm_local_vehiculos')) localStorage.setItem('crm_local_vehiculos', JSON.stringify([]));
        if(!localStorage.getItem('crm_local_citas')) localStorage.setItem('crm_local_citas', JSON.stringify([]));
        if(!localStorage.getItem('crm_local_submissions')) localStorage.setItem('crm_local_submissions', JSON.stringify([]));

        const API_BASE = 'https://strapicms-production.up.railway.app/api';

        let state = {
            vehiculos: [],
            ordenes: [],
            clientes: [],
            citas: [],
            leads: [],
            garaje_clientes: JSON.parse(localStorage.getItem('crm_garaje')) || [
                {id: 1, matricula: '4567 LMN', marca: 'Audi', modelo: 'A3', cliente: 'Carlos Ruiz', telefono: '34600111222', km_actual: 145000, prox_itv: '2026-08-15', prox_aceite_km: 150000},
                {id: 2, matricula: '9876 XYZ', marca: 'Renault', modelo: 'Clio', cliente: 'Ana García', telefono: '34600333444', km_actual: 82000, prox_itv: '2024-05-10', prox_aceite_km: 80000}
            ],
            facturas: JSON.parse(localStorage.getItem('crm_facturas')) || [],
            promociones: JSON.parse(localStorage.getItem('crm_promos')) || [],
            bot_active: localStorage.getItem('crm_bot_status') === 'true',
            currentSection: 'dashboard'
        };

        if(!localStorage.getItem('crm_garaje')) {
            localStorage.setItem('crm_garaje', JSON.stringify(state.garaje_clientes));
        }

        let billingChart = null;
        let ordsChart = null;

        function showSection(section) {
            state.currentSection = section;
            toggleSidebar(false);
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

            if (typeof event !== 'undefined' && event && event.currentTarget && event.currentTarget.classList) {
                event.currentTarget.classList.add('active');
            } else {
                const sidebarLinks = document.querySelectorAll('.nav-item');
                sidebarLinks.forEach(link => {
                    if (link.getAttribute('onclick')?.includes(`'${section}'`)) {
                        link.classList.add('active');
                    }
                });
            }

            const titles = {
                'dashboard': 'Panel General',
                'facturas': 'Sistema de Facturación PDF',
                'garaje': 'Garaje de Clientes',
                'bot': 'Chat y Canales de Alerta',
                'promociones': 'Campañas y Promociones',
                'stock': 'Coches en Venta',
                'ordenes': 'Reparaciones Abiertas',
                'clientes': 'Base de Datos de Clientes',
                'citas': 'Citas y Agenda del Taller',
                'leads': 'Mensajes y Consultas Web'
            };
            document.getElementById('section-title').innerText = titles[section] || 'Panel';

            const btnArea = document.getElementById('action-buttons');
            btnArea.classList.remove('hidden');

            if (section === 'facturas') {
                btnArea.innerHTML = `<button onclick="abrirModalFactura()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-bold shadow-lg"><i class="fas fa-file-invoice mr-2"></i> Crear Factura Nueva</button>`;
            } else if (section === 'promociones') {
                btnArea.innerHTML = `<button onclick="abrirModalPromo()" class="bg-purple-600 hover:bg-purple-500 text-white px-4 py-2 rounded-lg font-bold shadow-lg"><i class="fas fa-bullhorn mr-2"></i> Lanzar Campaña</button>`;
            } else if (section === 'clientes') {
                btnArea.innerHTML = `<button onclick="abrirModalCliente()" class="bg-orange-600 hover:bg-orange-500 text-white px-4 py-2 rounded-lg font-bold shadow-lg"><i class="fas fa-user-plus mr-2"></i> Registrar Cliente</button>`;
            } else if (section === 'ordenes') {
                btnArea.innerHTML = `<button onclick="abrirModalOrden()" class="bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded-lg font-bold shadow-lg"><i class="fas fa-plus mr-2"></i> Nueva Orden de Trabajo</button>`;
            } else if (section === 'garaje') {
                btnArea.innerHTML = `<button onclick="abrirModalVehiculo()" class="bg-teal-600 hover:bg-teal-500 text-white px-4 py-2 rounded-lg font-bold shadow-lg"><i class="fas fa-car-side mr-2"></i> Añadir Vehículo</button>`;
            } else if (section === 'stock') {
                btnArea.innerHTML = `<button onclick="abrirModalStock()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg font-bold shadow-lg"><i class="fas fa-car mr-2"></i> Añadir Coche Stock</button>`;
            } else if (section === 'citas') {
                btnArea.innerHTML = `<button onclick="abrirModalCita()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg font-bold shadow-lg"><i class="fas fa-calendar-plus mr-2"></i> Programar Cita</button>`;
            } else {
                btnArea.innerHTML = '';
            }

            renderContent();
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
        }

        function toggleSidebar(force) {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            const open = typeof force === 'boolean' ? force : sidebar.classList.contains('-translate-x-full');
            sidebar.classList.toggle('-translate-x-full', !open);
            backdrop.classList.toggle('hidden', !open);
        }

        function normalizeEntity(item) {
            if (item && typeof item === 'object' && !item.attributes) {
                const { id, documentId, ...rest } = item;
                return { id: documentId || id || Date.now(), attributes: rest };
            }
            return item;
        }

        async function postEntity(endpoint, data, localKey, extras = {}) {
            try {
                // Strapi v5: sin ?status=published la entrada se crea como borrador y no aparece en la web
                const res = await fetchAPI(`${API_BASE}/${endpoint}?status=published`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data })
                });
                if (res.ok) {
                    const saved = await res.json();
                    const normalized = normalizeEntity(saved.data);
                    normalized.attributes = { ...extras, ...normalized.attributes };
                    return normalized;
                }
                console.warn(`POST ${endpoint} falló (${res.status}):`, await res.text());
            } catch (e) {
                console.warn(`Could not POST to ${endpoint}, using local storage fallback`, e);
            }

            const localList = JSON.parse(localStorage.getItem(localKey)) || [];
            const localItem = {
                id: 'local_' + Date.now(),
                attributes: { ...data, ...extras }
            };
            localList.push(localItem);
            localStorage.setItem(localKey, JSON.stringify(localList));
            return localItem;
        }

        async function fetchData() {
            document.getElementById('sync-icon')?.classList.add('fa-spin');
            try {
                const [vReq, oReq, cReq, ciReq, lReq] = await Promise.all([
                    fetchAPI(`${API_BASE}/stock-vehicles?populate=*`),
                    fetchAPI(`${API_BASE}/orden-reparacions?populate=*`),
                    fetchAPI(`${API_BASE}/clientes?populate=*`),
                    fetchAPI(`${API_BASE}/citas?populate=*`),
                    fetchAPI(`${API_BASE}/contact-submissions?populate=*`)
                ]);

                const vData = resData(await vReq.json());
                const oData = resData(await oReq.json());
                const cData = resData(await cReq.json());
                const ciData = resData(await ciReq.json());
                const lData = resData(await lReq.json());

                const localVehs = JSON.parse(localStorage.getItem('crm_local_vehiculos')) || [];
                const localOrds = JSON.parse(localStorage.getItem('crm_local_ordenes')) || [];
                const localClis = JSON.parse(localStorage.getItem('crm_local_clientes')) || [];
                const localCits = JSON.parse(localStorage.getItem('crm_local_citas')) || [];
                const localLeads = JSON.parse(localStorage.getItem('crm_local_submissions')) || [];

                const normalize = (arr) => arr.map(normalizeEntity);

                state.vehiculos = normalize([...localVehs, ...vData]);
                state.ordenes = normalize([...localOrds, ...oData]);
                state.clientes = normalize([...localClis, ...cData]);
                state.citas = normalize([...localCits, ...ciData]);
                state.leads = normalize([...localLeads, ...lData]);

                // Fetch site-setting as well
                try {
                    const ssReq = await fetchAPI(`${API_BASE}/site-setting`);
                    if (ssReq.ok) {
                        const ssJson = await ssReq.json();
                        if (ssJson.data) {
                            const attrs = ssJson.data.attributes || ssJson.data;
                            if (attrs.chatwootToken !== undefined) {
                                localStorage.setItem('crm_chatwoot_enabled', attrs.chatwootEnabled ? 'true' : 'false');
                                localStorage.setItem('crm_chatwoot_token', attrs.chatwootToken || '');
                                localStorage.setItem('crm_chatwoot_url', attrs.chatwootUrl || 'http://localhost:3000');
                            }
                        }
                    }
                } catch (e) {
                    console.warn("Could not sync site-setting from Strapi.", e);
                }

                renderContent();
            } catch (err) {
                console.warn("API base inaccessible. Loading local offline database.", err);
                state.vehiculos = JSON.parse(localStorage.getItem('crm_local_vehiculos')) || [];
                state.ordenes = JSON.parse(localStorage.getItem('crm_local_ordenes')) || [];
                state.clientes = JSON.parse(localStorage.getItem('crm_local_clientes')) || [];
                state.citas = JSON.parse(localStorage.getItem('crm_local_citas')) || [];
                state.leads = JSON.parse(localStorage.getItem('crm_local_submissions')) || [];
                renderContent();
            } finally {
                document.getElementById('sync-icon')?.classList.remove('fa-spin');
            }
        }

        function resData(obj) {
            return obj && obj.data ? obj.data : [];
        }

        function guardarGarajeLocal() {
            localStorage.setItem('crm_garaje', JSON.stringify(state.garaje_clientes));
        }

        // --- INICIALIZAR GRÁFICOS DEL DASHBOARD ---
        function initDashboardCharts() {
            if (typeof Chart === 'undefined') return;
            setTimeout(() => {
                const ctxBilling = document.getElementById('billingChart')?.getContext('2d');
                const ctxOrds = document.getElementById('ordsChart')?.getContext('2d');

                if (billingChart) billingChart.destroy();
                if (ordsChart) ordsChart.destroy();

                const lastFacturas = state.facturas.slice(-6);
                const labelsBilling = lastFacturas.map(f => f.numero);
                const dataBilling = lastFacturas.map(f => f.total);

                if (ctxBilling) {
                    billingChart = new Chart(ctxBilling, {
                        type: 'bar',
                        data: {
                            labels: labelsBilling.length ? labelsBilling : ['Sin datos'],
                            datasets: [{
                                label: 'Ingresos (€)',
                                data: dataBilling.length ? dataBilling : [0],
                                backgroundColor: 'rgba(59, 130, 246, 0.4)',
                                borderColor: 'rgba(59, 130, 246, 1)',
                                borderWidth: 2,
                                borderRadius: 6
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                                x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                            }
                        }
                    });
                }

        function guardarFactura() {
            const cliente = document.getElementById('fac-cliente').value; const dni = document.getElementById('fac-dni').value;
            const filas = document.querySelectorAll('.fac-row'); let total = 0; let items = [];
            filas.forEach(f => {
                const desc = f.querySelector('.f-desc').value; const qty = Number(f.querySelector('.f-qty').value); const precio = Number(f.querySelector('.f-precio').value);
                if(desc && precio) { items.push({desc, qty, precio, subtotal: qty*precio}); total += qty*precio; }
            });
            const totalIVA = total * 1.21;
            const num = "F-" + new Date().getFullYear() + "-" + String(state.facturas.length + 1).padStart(3, '0');
            state.facturas.push({ id: Date.now(), numero: num, cliente, dni, items, base: total, total: totalIVA, fecha: new Date().toLocaleDateString() });

            closeModal(); renderContent(); Swal.fire('Guardada', 'Factura generada con éxito.', 'success');

        function descargarPDF(id) {
            const fac = state.facturas.find(f => f.id === id);

                Swal.fire('Sin conexión', 'No se pudo cargar el generador de PDF. Revisa tu conexión e inténtalo de nuevo.', 'error');
                return;
            }
            const { jsPDF } = window.jspdf; const doc = new jsPDF();

            doc.setFontSize(22); doc.setTextColor(59, 130, 246); doc.text("EL TALLER DE MIGUE", 20, 20);
            doc.setFontSize(10); doc.setTextColor(100); doc.text("Moli Nou 8, 46722 Benifla (Valencia) | CIF: B12345678", 20, 28);

            doc.setFontSize(14); doc.setTextColor(0); doc.text(`FACTURA ${fac.numero}`, 140, 20);
            doc.setFontSize(10); doc.text(`Fecha: ${fac.fecha}`, 140, 28);

            doc.setFillColor(240, 240, 240); doc.rect(20, 40, 170, 25, 'F');
            doc.text("DATOS DEL CLIENTE:", 25, 48); doc.setFontSize(11); doc.text(fac.cliente, 25, 54); doc.setFontSize(9); doc.text(`DNI/CIF: ${fac.dni}`, 25, 60);

            const tableData = fac.items.map(i => [i.desc, i.qty, `EUR ${i.precio.toFixed(2)}`, `EUR ${i.subtotal.toFixed(2)}`]);

            doc.text(`IVA (21%): EUR ${(fac.total - fac.base).toFixed(2)}`, 130, finalY + 7);
            doc.setFontSize(13); doc.setTextColor(59, 130, 246); doc.text(`TOTAL: EUR ${fac.total.toFixed(2)}`, 130, finalY + 15);

            doc.save(`${fac.numero}_ElTallerDeMigue.pdf`);
        }

        async function guardarOrden() {
            const matricula = document.getElementById('ord-matricula').value;
            const clienteVal = document.getElementById('ord-cliente-select').value;
            const km = Number(document.getElementById('ord-km').value);
            const presupuesto = Number(document.getElementById('ord-presupuesto').value);
            const estado = document.getElementById('ord-estado').value;
            const fecha = document.getElementById('ord-fecha').value;
            const sintomas = document.getElementById('ord-sintomas').value;

            if (!matricula || !sintomas) {
                Swal.fire('Error', 'Matrícula del coche y síntomas son requeridos.', 'error');
                return;
            }

            let clienteId = null;
            let clienteNombre = "Cliente No Registrado";

            if (clienteVal === 'nuevo') {
                const nombre = document.getElementById('ord-cli-nombre').value;
                const telefono = document.getElementById('ord-cli-telefono').value;
                if (!nombre || !telefono) {
                    Swal.fire('Error', 'Ingrese Nombre y Teléfono del cliente para crearlo.', 'error');
                    return;
                }
                const clientData = { nombre, telefono, consentimiento_gdpr: true };
                const savedClient = await postEntity('clientes', clientData, 'crm_local_clientes');
                state.clientes.push(savedClient);
                clienteId = savedClient.id;
                clienteNombre = nombre;
            } else if (clienteVal) {
                clienteId = clienteVal;
                const found = state.clientes.find(c => c.id == clienteId);
                clienteNombre = found ? (found.attributes?.nombre || found.nombre) : 'Cliente de Ficha';
            }

            const data = {
                matricula,
                estado,
                sintomas,
                kilometros_entrada: km,
                presupuesto_estimado: presupuesto,
                fecha_entrada: new Date(fecha).toISOString()
            };
            // La relacion solo se envia si el cliente existe en el servidor (documentId real)
            if (clienteId && !String(clienteId).startsWith('local_')) data.cliente = clienteId;

            const saved = await postEntity('orden-reparacions', data, 'crm_local_ordenes', { cliente_nombre: clienteNombre });
            state.ordenes.push(saved);

            const existsInGarage = state.garaje_clientes.some(g => g.matricula.replace(/\s+/g,'').toLowerCase() === matricula.replace(/\s+/g,'').toLowerCase());
            if (!existsInGarage) {
                const nuevoVeh = {
                    id: Date.now(),
                    matricula: matricula.toUpperCase(),
                    marca: 'General',
                    modelo: 'Vehículo',
                    cliente: clienteNombre,
                    telefono: '34625786438',
                    km_actual: km || 0,
                    prox_itv: new Date(Date.now() + 365*24*60*60*1000).toISOString().split('T')[0],
                    prox_aceite_km: (km || 0) + 15000
                };
                state.garaje_clientes.push(nuevoVeh);
                guardarGarajeLocal();
            }

            closeModal();
            renderContent();
            Swal.fire('Creado', 'La orden de reparación se creó con éxito.', 'success');
        }

        async function updateORStatus(id, newStatus) {
            const ord = state.ordenes.find(o => o.id == id);
            if (ord) {
                ord.attributes.estado = newStatus;

                if (String(id).startsWith('local_')) {
                    const localOrds = JSON.parse(localStorage.getItem('crm_local_ordenes')) || [];
                    const idx = localOrds.findIndex(o => o.id == id);
                    if (idx !== -1) {
                        localOrds[idx].attributes.estado = newStatus;
                        localStorage.setItem('crm_local_ordenes', JSON.stringify(localOrds));
                    }
                } else {
                    try {
                        await fetchAPI(`${API_BASE}/orden-reparacions/${id}?status=published`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ data: { estado: newStatus } })
                        });
                    } catch (e) {
                        console.warn("Could not sync state change with Strapi, saved local instance only", e);
                    }
                }

                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'success',
                    title: `OR-${id} cambiada a ${newStatus}`,
                    showConfirmButton: false,
                    timer: 1800
                });
                renderContent();
            }
        }

        async function guardarCita() {
            const titulo = document.getElementById('cit-titulo').value;
            const clienteVal = document.getElementById('cit-cliente').value;
            const fecha = document.getElementById('cit-fecha').value;
            const tipo = document.getElementById('cit-tipo').value;
            const notas = document.getElementById('cit-notas').value;

            if(!titulo || !fecha) {
                Swal.fire('Error', 'Título de cita y fecha/hora son requeridos.', 'error');
                return;
            }

            let clienteId = clienteVal || null;
            let clienteNombre = 'Cliente Ocasional';
            if (clienteId) {
                const found = state.clientes.find(c => c.id == clienteId);
                clienteNombre = found ? (found.attributes?.nombre || found.nombre) : 'Cliente';
            }

            const data = {
                titulo,
                fecha_hora: new Date(fecha).toISOString(),
                tipo,
                estado: 'Programada',
                notas
            };
            if (clienteId && !String(clienteId).startsWith('local_')) data.cliente = clienteId;

            const saved = await postEntity('citas', data, 'crm_local_citas', { cliente_nombre: clienteNombre });
            state.citas.push(saved);
            closeModal();
            renderContent();
            Swal.fire('Reservada', 'Cita agendada correctamente.', 'success');
        }

        async function updateCitaStatus(id, newStatus) {
            const cit = state.citas.find(c => c.id == id);
            if (cit) {
                if (cit.attributes) cit.attributes.estado = newStatus;
                else cit.estado = newStatus;

                if (String(id).startsWith('local_')) {
                    const localCits = JSON.parse(localStorage.getItem('crm_local_citas')) || [];
                    const idx = localCits.findIndex(c => c.id == id);
                    if (idx !== -1) {
                        localCits[idx].attributes.estado = newStatus;
                        localStorage.setItem('crm_local_citas', JSON.stringify(localCits));
                    }
                } else {
                    try {
                        await fetchAPI(`${API_BASE}/citas/${id}?status=published`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ data: { estado: newStatus } })
                        });
                    } catch (e) {
                        console.warn("Could not put status update to Strapi, local change only", e);
                    }
                }

                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'success',
                    title: `Cita cambiada a ${newStatus}`,
                    showConfirmButton: false,
                    timer: 1800
                });
                renderContent();
            }
        }

        // --- FUNCIONES LEADS (MENSAJES WEB) ---
        async function toggleLeadRead(id, forceValue = null) {
            const lead = state.leads.find(l => l.id == id);
            if (lead) {
                const currentRead = lead.attributes ? lead.attributes.read : lead.read;
                const newRead = forceValue !== null ? forceValue : !currentRead;

                if (lead.attributes) lead.attributes.read = newRead;
                else lead.read = newRead;

                if (String(id).startsWith('local_')) {
                    const localLeads = JSON.parse(localStorage.getItem('crm_local_submissions')) || [];
                    const idx = localLeads.findIndex(l => l.id == id);
                    if (idx !== -1) {
                        localLeads[idx].read = newRead;
                        localStorage.setItem('crm_local_submissions', JSON.stringify(localLeads));
                    }
                } else {
                    try {
                        await fetchAPI(`${API_BASE}/contact-submissions/${id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ data: { read: newRead } })
                        });
                    } catch (e) {
                        console.warn("Failed syncing read status, local state updated only", e);
                    }
                }

                renderContent();
            }
        }

        async function convertirLeadACliente(id) {
            const lead = state.leads.find(l => l.id == id);
            if (!lead) return;

            const attrs = lead.attributes || lead;
            const phone = attrs.phone || attrs.telefono;

            const exists = state.clientes.some(c => (c.attributes?.telefono || c.telefono) === phone);
            if (exists) {
                Swal.fire('Info', 'Este número de teléfono ya pertenece a un cliente registrado.', 'info');
                return;
            }

            const nameParts = (attrs.name || attrs.nombre || 'Cliente Web').split(' ');
            const nombre = nameParts[0] || 'Cliente';
            const apellidos = nameParts.slice(1).join(' ') || '';
            const email = attrs.email || '';

            const data = {
                nombre,
                apellidos,
                telefono: phone || 'Sin teléfono',
                email,
                consentimiento_gdpr: true
            };

            const saved = await postEntity('clientes', data, 'crm_local_clientes');
            state.clientes.push(saved);

            await toggleLeadRead(id, true);

            Swal.fire('Registrado', `${nombre} ha sido incorporado como cliente en el CRM.`, 'success');
            renderContent();
        }

        function guardarPromo() {
            const titulo = document.getElementById('promo-titulo').value;
            const canal = document.getElementById('promo-canal').value;
            const segmento = document.getElementById('promo-segmento').value;
            const mensaje = document.getElementById('promo-mensaje').value;

            if(!titulo || !mensaje) {
                Swal.fire('Error', 'Por favor complete todos los campos obligatorios.', 'error');
                return;
            }

            let destinatarios = [];
            if (segmento === 'todos') {
                destinatarios = state.clientes.map(c => c.attributes?.nombre || c.nombre)
                                .concat(state.garaje_clientes.map(g => g.cliente));
            } else if (segmento === 'itv') {
                destinatarios = state.garaje_clientes
                    .filter(g => new Date(g.prox_itv) <= new Date(Date.now() + 30*24*60*60*1000))
                    .map(g => g.cliente);
            } else if (segmento === 'aceite') {
                destinatarios = state.garaje_clientes
                    .filter(g => g.km_actual >= g.prox_aceite_km)
                    .map(g => g.cliente);
            }

            destinatarios = [...new Set(destinatarios.filter(Boolean))];

            const nuevaPromo = {
                id: Date.now(),
                titulo,
                canal,
                segmento,
                destinatariosCount: destinatarios.length,
                mensaje,
                fecha: new Date().toLocaleDateString()
            };

            state.promociones.push(nuevaPromo);
            localStorage.setItem('crm_promos', JSON.stringify(state.promociones));
            closeModal();
            renderContent();

            Swal.fire({
                title: '¡Campaña Lanzada!',
                text: `Campaña registrada correctamente. Se enviará a ${destinatarios.length} destinatarios mediante ${canal}.`,
                icon: 'success'
            });
        }

            localStorage.setItem('crm_chatwoot_enabled', enabled ? 'true' : 'false');

                        }
                    };

                    const resPut = await fetchAPI(`${API_BASE}/site-setting`, {
                        method: 'PUT',

                    if (resPut.ok) {

                    const fDateTime = ct.attributes?.fecha_hora || ct.fecha_hora;
                    const dateObj = new Date(fDateTime);
                    const formattedDate = fDateTime ? dateObj.toLocaleString('es-ES', {weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'}) : '---';
                    const est = ct.attributes?.estado || ct.estado || 'Programada';
                    const type = ct.attributes?.tipo || ct.tipo || 'Taller - Reparación';
                    const cliRel = ct.attributes?.cliente;
                    const cliName = ct.attributes?.cliente_nombre || cliRel?.data?.attributes?.nombre || cliRel?.nombre || 'Cliente';
                    const notes = ct.attributes?.notas || ct.notes || '';

                    const timeHour = dateObj.toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'});
                    const dateDay = dateObj.toLocaleDateString('es-ES', {day: 'numeric', month: 'numeric', year: 'numeric'});
                    const reminderText = encodeURIComponent(`Hola ${cliName}, te recordamos tu cita en El Taller de Migue programada para el día ${dateDay} a las ${timeHour} para el servicio de: ${tituloCita(ct)}.\nPor favor, respóndenos a este mensaje para confirmar tu asistencia. ¡Gracias!`);

                    const selectEstado = `
                        <select onchange="updateCitaStatus('${ct.id}', this.value)" class="text-xs bg-slate-900 border border-slate-700 rounded-lg p-1 w-32">
                            <option value="Programada" ${est === 'Programada' ? 'selected' : ''}>Programada</option>
                            <option value="Confirmada" ${est === 'Confirmada' ? 'selected' : ''}>Confirmada</option>
                            <option value="Completada" ${est === 'Completada' ? 'selected' : ''}>Completada</option>
                            <option value="Cancelada" ${est === 'Cancelada' ? 'selected' : ''}>Cancelada</option>
                        </select>
                    `;

                    let typeColorBadge = 'bg-red-600/20 text-red-400 border-red-500/20';
                    if (type.includes('Revisión')) typeColorBadge = 'bg-blue-600/20 text-blue-400 border-blue-500/20';
                    else if (type.includes('Ver')) typeColorBadge = 'bg-green-600/20 text-green-400 border-green-500/20';
                    else if (type.includes('Entregar')) typeColorBadge = 'bg-purple-600/20 text-purple-400 border-purple-500/20';

                    html += `
                        <tr class="hover:bg-slate-800/30">
                            <td class="p-4 font-semibold text-white">${formattedDate}</td>
                            <td class="p-4 font-medium" title="${notes}">${ct.attributes?.titulo || ct.titulo}</td>
                            <td class="p-4">
                                <span class="badge border ${typeColorBadge}">${type}</span>
                            </td>
                            <td class="p-4 text-slate-300">${cliName}</td>
                            <td class="p-4">${selectEstado}</td>
                            <td class="p-4 text-right">
                                <a href="https://wa.me/?text=${reminderText}" target="_blank" class="text-xs bg-emerald-600/20 text-emerald-400 px-3 py-1.5 rounded-lg hover:bg-emerald-600/40 transition-colors inline-flex items-center gap-1">
                                    <i class="fab fa-whatsapp"></i> Recordar
                                </a>
                            </td>
                        </tr>
                    `;
                });
                html += `</tbody></table></div>`;
                c.innerHTML = html;
            }
            else if (state.currentSection === 'leads') {
                let html = `<div class="glass-panel p-6 rounded-2xl mb-6">
                    <h3 class="text-lg font-bold mb-2 text-slate-200">Mensajes de la Web</h3>
                    <p class="text-sm text-slate-400">Leads recibidos a través del formulario de contacto y peticiones de cita de la página pública.</p>
                </div>
                <div class="glass-panel rounded-2xl overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-800/50 border-b border-slate-800 text-slate-400">
                                <th class="p-4">Remitente</th>
                                <th class="p-4">Teléfono</th>
                                <th class="p-4">Email</th>
                                <th class="p-4">Mensaje / Consulta</th>
                                <th class="p-4">Estado</th>
                                <th class="p-4 text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800/50 text-slate-300">`;
                if (state.leads.length === 0) {
                    html += `<tr><td colspan="6" class="p-8 text-center text-slate-500">No se han recibido mensajes por el momento.</td></tr>`;
                }
                state.leads.forEach(l => {
                    const attrs = l.attributes || l;
                    const name = attrs.name || attrs.nombre || 'Interesado';
                    const tel = attrs.phone || attrs.telefono || '---';
                    const mail = attrs.email || '---';
                    const msg = attrs.message || attrs.mensaje || '---';
                    const read = attrs.read === true;

                    const waText = encodeURIComponent(`Hola ${name}, te contactamos desde El Taller de Migue respecto a tu consulta en la web: "${msg.substring(0, 50)}...". ¿Cómo te podemos ayudar?`);

                    html += `
                        <tr class="${read ? 'opacity-65 hover:opacity-100' : 'font-bold bg-slate-900/30'} hover:bg-slate-800/20 transition-all">
                            <td class="p-4 text-white">${name}</td>
                            <td class="p-4 text-slate-300">${tel}</td>
                            <td class="p-4 text-slate-400">${mail}</td>
                            <td class="p-4 text-slate-400 max-w-sm truncate" title="${msg}">${msg}</td>
                            <td class="p-4">
                                <span class="badge ${read ? 'badge-draft' : 'badge-pending'} cursor-pointer" onclick="toggleLeadRead('${l.id}')">
                                    ${read ? 'Leído' : 'Nuevo'}
                                </span>
                            </td>
                            <td class="p-4 text-right flex justify-end gap-2">
                                <button onclick="toggleLeadRead('${l.id}')" class="text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-2 py-1 rounded" title="Marcar leído/no leído">
                                    <i class="fas ${read ? 'fa-envelope' : 'fa-envelope-open'}"></i>
                                </button>
                                <button onclick="convertirLeadACliente('${l.id}')" class="text-xs bg-orange-600/25 text-orange-400 hover:bg-orange-600/40 px-2.5 py-1 rounded-lg border border-orange-500/20" title="Guardar como Cliente CRM">
                                    <i class="fas fa-user-plus mr-1"></i> Fichar
                                </button>
                                <a href="https://wa.me/${tel}?text=${waText}" target="_blank" class="text-xs bg-emerald-600/20 text-emerald-400 hover:bg-emerald-600/40 px-2.5 py-1 rounded-lg border border-emerald-500/20" title="Contactar por WhatsApp">
                                    <i class="fab fa-whatsapp"></i> Chat
                                </a>
                            </td>
                        </tr>
                    `;
                });
                html += `</tbody></table></div>`;
                c.innerHTML = html;
            }
        }

        function tituloCita(ct) {
            return ct.attributes?.titulo || ct.titulo || 'Mantenimiento';
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(!checkAuth()) return;
            fetchData();
            showSection('dashboard');
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
